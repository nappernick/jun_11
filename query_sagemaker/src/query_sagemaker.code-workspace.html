  width: 100%;
  height: 100%;
  margin: 0;
  top: 0;
  overflow: hidden;
}

body {
  background: gray;
}

i.bi{
  margin: 0 10px;
}


.pdf-preview-container{
  position: relative;
}
.tippy-is-shown .pdf-preview-container:before {
  content: ' ';
  position: absolute;
  inset: 0;
}

.pdf-preview-root {
  display: none;
}

.pdf-preview-list {
  position: absolute;
  bottom: 0;
  left: 0;
  max-width: 500px;
  min-width: 100px;
  max-height: max(50VH, 500px);
  display: flex;
  flex-direction: column;
}

.main-btns-container{
  display: flex;
  column-gap: 10px;
}

.download-all-btn {
  font-size: 1.2rem;
  line-height: 2em;
  font-weight: bolder;
  width: 100%;
}

.merge-all-btn{
  font-size: 1.2rem;
}

.other-btns-container {
  position: absolute;
  left: 100%;
  height: 100%;
  bottom: 0;
  display: none;
  font-size:1.2rem;
}

.pdf-preview-list:hover .other-btns-container{
  display: flex;
}

.pdf-preview-list ol {
  list-style-position: inside;
  margin: 0;
  padding: 0;
  color: white;
  flex: 1;
  overflow: auto;
  background: linear-gradient(90deg, #323639, transparent);
}

.pdf-preview-list ol li{
  padding: 10px;
  cursor: pointer;
}
.pdf-preview-list ol li:hover{
  background: white;
  color: black;
}

.pdf-preview-list .file-item {
  display: inline-block;
  max-width: 400px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.pdf-preview-list .file-item-li.current-file-item-li {
  font-weight: bolder;
}
.pdf-preview-list .file-item-li.current-file-item-li i.bi:before {
  content: "\f63f";
}


.pdf-preview-list ::-webkit-scrollbar-thumb{
  background: transparent;
}
.pdf-preview-list ::-webkit-scrollbar-track{
  background: transparent;
}
.pdf-preview-list:hover ::-webkit-scrollbar-thumb{
  background: var(--lighterBackground);
}

.pdf-preview-list:hover ::-webkit-scrollbar-track{
  background: var(--defaultBackground);
}


.pdf-preview-buttons {
  position: absolute;
  right: 0;
  bottom: 0;
  margin: 5px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.page-sub-btns {
  position: absolute;
  right: 100%;
  height: 100%;
  display: flex;
  flex-direction: row-reverse;
}

.page-sub-btns .btn {
  height: 100%;
  font-size:1.2rem;
}

.image-pdf-container {
  display: flex;
  flex-direction: column;
  white-space: nowrap;
}

.page-sub-btns .image-pdf-container .btn {
  font-size: .7rem;
}

.page-sub-btns .rating-container {
  position: absolute;
  bottom: 100%;
  right: 0;
  margin: 10px;
}

.mail-dialog {
  padding: 0;
}

.download-pdf-link {
  text-decoration: none;
  color: initial;
  font-size: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
}
.download-pdf-link i.bi{
  margin-left: 0;
}
.pdf-info {
  font-size: 12px;
}

.pdf-object {
  width: 100%;
  height: 100%;
}

.compress-dialog .compress-msg{
  position: absolute;
  z-index: 1;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: lightblue;
}


/*
 * store
 **/

.list-item {
    padding: .5em;
    cursor: pointer;
}

.list-item-icon{
  float: right;
}

.list-item.store-class {
    font-weight: bolder;
}

.sub-list-item {
    padding-left: 2em;
}

.list-item:hover {
    background: gray;
}

.list-items {
    padding: .5em 0;
    max-height: 600px;
